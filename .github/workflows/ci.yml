name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test Python API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Docker Compose config
        run: |
          docker compose config

      - name: Build MLflow image
        run: |
          docker compose build mlflow

      - name: Start MLflow
        run: |
          docker compose up -d mlflow

      - name: Check MLflow health
        run: |
          echo "Waiting for MLflow to start..."
          for i in {1..60}; do
            if curl -f http://127.0.0.1:5001; then
              echo "MLflow is reachable"
              exit 0
            fi
            echo "MLflow not ready yet..."
            sleep 2
          done

          echo "MLflow failed to become reachable"
          exit 1

      - name: Train and register model
        run: |
          MLFLOW_TRACKING_URI=http://127.0.0.1:5001 python training/train.py \
            --registered-model-name mlops-fastapi-classifier

      - name: Run tests
        run: |
          python -m pytest

      - name: Build Docker Compose images
        run: |
          docker compose build

      - name: Start Docker Compose stack
        run: |
          docker compose up -d

      - name: Check API health
        run: |
          echo "Waiting for API to start..."
          for i in {1..60}; do
            if curl -f http://127.0.0.1:8000/health; then
              echo "API is healthy"
              exit 0
            fi
            echo "API not ready yet..."
            sleep 2
          done

          echo "API failed to become healthy"
          exit 1

      - name: Check API prediction endpoint
        run: |
          curl -f -X POST "http://127.0.0.1:8000/predict" \
            -H "Content-Type: application/json" \
            -d '{
              "features": [
                17.99, 10.38, 122.8, 1001.0, 0.1184,
                0.2776, 0.3001, 0.1471, 0.2419, 0.07871,
                1.095, 0.9053, 8.589, 153.4, 0.006399,
                0.04904, 0.05373, 0.01587, 0.03003, 0.006193,
                25.38, 17.33, 184.6, 2019.0, 0.1622,
                0.6656, 0.7119, 0.2654, 0.4601, 0.1189
              ]
            }'
          echo ""

      - name: Check Prometheus health
        run: |
          echo "Waiting for Prometheus to start..."
          for i in {1..30}; do
            if curl -f http://127.0.0.1:9090/-/healthy; then
              echo "Prometheus is healthy"
              exit 0
            fi
            echo "Prometheus not ready yet..."
            sleep 2
          done

          echo "Prometheus failed to become healthy"
          exit 1

      - name: Check Grafana health
        run: |
          echo "Waiting for Grafana to start..."
          for i in {1..60}; do
            if curl -f http://127.0.0.1:3000/api/health; then
              echo "Grafana is healthy"
              exit 0
            fi
            echo "Grafana not ready yet..."
            sleep 2
          done

          echo "Grafana failed to become healthy"
          exit 1

      - name: Show Docker Compose logs on failure
        if: failure()
        run: |
          docker compose logs

      - name: Stop Docker Compose
        if: always()
        run: |
          docker compose down