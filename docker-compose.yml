services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: mlops-model-service:local
    container_name: mlops-model-service-api
    ports:
      - "8000:8000"
    environment:
      - ENV=local
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: mlops-model-service-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api
    restart: unless-stopped